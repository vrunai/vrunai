<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; connect-src 'self' https://api.anthropic.com https://api.openai.com https://generativelanguage.googleapis.com ws: wss:; img-src 'self' data:;" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>VRUNAI — Open Source LLM Agent Evaluation Framework</title>
    <style>
      html, body, #root { height: 100%; margin: 0; padding: 0; background: var(--bg-base, #0a0a0b); }
    </style>
  </head>
  <body>
    <script>
      (function() {
        var t = localStorage.getItem('vrunai:theme');
        if (!t) t = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        if (t === 'light') document.documentElement.classList.add('light');
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
